name: Build & Release APK

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Whether to create a GitHub Release in manual runs'
        required: false
        type: boolean
        default: false
      release_tag:
        description: 'Tag to use for manual release (for example: v1.0.1)'
        required: false
        type: string
  # 推送 tag 时自动触发（如 v1.0.0）
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. 安装 Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      # 4. 从 GitHub Secrets 解码签名密钥
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      # 5. 创建 key.properties
      - name: Create key.properties
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      # 6. 安装依赖
      - name: Install dependencies
        run: flutter pub get

      # 7. 构建 Release APK
      - name: Build APK
        run: flutter build apk --release

      # 8. 上传 APK 为构建产物
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tududa-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # 如果是 tag 推送，自动创建 GitHub Release
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.create_release && inputs.release_tag != '')
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

    permissions:
      contents: write

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: tududa-release-apk

      - name: Rename APK
        run: mv app-release.apk tududa-${RELEASE_TAG}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: Tududa ${{ env.RELEASE_TAG }}
          body: |
            ## Tududa ${{ env.RELEASE_TAG }}

            ### 📦 下载
            下载下方的 APK 文件安装到 Android 设备。

            ### ⚠️ 安装说明
            需要在手机设置中允许「安装未知来源应用」。
          files: tududa-${{ env.RELEASE_TAG }}.apk
          draft: false
          prerelease: false
